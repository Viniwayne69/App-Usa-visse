<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#062D12">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Usa Visse">
  <meta name="description" content="Vitrine mobile da Usa Visse: camisas criativas com sotaque, humor e orgulho regional">
  <title>Usa Visse | Camisas criativas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="icon" id="favicon" href="">
  <link rel="manifest" id="manifestLink" href="">
  <style>
    :root {
      --forest: #0c4a22;
      --sun: #c88a0a;
      --clay: #c96b1d;
      --paper: #f2f1e8;
      --olive: #2f5630;
      --ink: #102018;
      --line: rgba(242, 241, 232, .18);
      --muted: rgba(242, 241, 232, .72);
      --shadow: 0 18px 52px rgba(0, 0, 0, .36);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      font-family: "Open Sans", ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }

    html {
      min-height: 100%;
      background: var(--forest);
      color: var(--paper);
      font-family: "Open Sans", ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
    }

    body {
      min-height: 100vh;
      margin: 0;
      background:
        radial-gradient(circle at 18% 8%, rgba(201, 107, 29, .16), transparent 28rem),
        radial-gradient(circle at 88% 18%, rgba(200, 138, 10, .14), transparent 24rem),
        linear-gradient(150deg, #0b371a 0%, var(--forest) 48%, #073118 100%);
      color: var(--paper);
      overflow-x: hidden;
    }

    body:before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -1;
      opacity: .14;
      pointer-events: none;
      background-image:
        linear-gradient(90deg, rgba(242, 241, 232, .05) 1px, transparent 1px),
        linear-gradient(rgba(242, 241, 232, .04) 1px, transparent 1px);
      background-size: 28px 28px;
      mask-image: linear-gradient(to bottom, #000, transparent 86%);
    }

    button, input, select, textarea {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    input, select, textarea {
      width: 100%;
      border: 1px solid rgba(242, 241, 232, .2);
      border-radius: 8px;
      background: rgba(11, 15, 20, .68);
      color: var(--paper);
      outline: 0;
      padding: 12px 13px;
      min-height: 46px;
    }

    textarea {
      min-height: 94px;
      resize: vertical;
    }

    input::placeholder, textarea::placeholder { color: rgba(242, 241, 232, .44); }

    label {
      display: grid;
      gap: 7px;
      color: rgba(242, 241, 232, .78);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: .04em;
      text-transform: uppercase;
    }

    .app {
      width: min(1120px, 100%);
      min-height: 100vh;
      margin: 0 auto;
      padding: 16px 14px calc(94px + var(--safe-bottom));
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin: -16px 0 14px;
      padding: 12px 14px;
      background: rgba(11, 72, 34, .9);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(14px);
    }

    .brand-lockup {
      display: flex;
      align-items: center;
      flex: 1 1 auto;
      min-width: 0;
      overflow: hidden;
      padding-right: 0;
      gap: 10px;
    }

    .brand-lockup > div:last-child {
      min-width: 0;
    }

    .mark {
      width: 44px;
      height: 44px;
      padding: 0;
      border: 1px solid rgba(200, 138, 10, .7);
      border-radius: 50%;
      display: grid;
      place-items: center;
      flex: 0 0 auto;
      background: linear-gradient(145deg, rgba(201, 107, 29, .24), rgba(6, 45, 18, .76));
      box-shadow: inset 0 0 0 4px rgba(6, 45, 18, .6);
    }

    .brand-title {
      margin: 0;
      font-size: clamp(22px, 5vw, 32px);
      line-height: 1;
      font-weight: 900;
      text-transform: uppercase;
      text-shadow: 1px 1px 0 rgba(201, 107, 29, .55);
      color: var(--paper);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .brand-subtitle {
      margin-top: 4px;
      color: rgba(242, 241, 232, .92);
      font-size: 11px;
      font-weight: 900;
      text-transform: none;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .top-actions {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      flex: 0 0 auto;
      gap: 8px;
      width: auto;
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
    }

    .icon-btn {
      width: 42px;
      height: 42px;
      flex: 0 0 42px;
      border-radius: 50%;
      border: 1px solid rgba(242, 241, 232, .18);
      color: var(--paper);
      background: rgba(35, 61, 36, .78);
      display: grid;
      place-items: center;
      transition: transform .2s ease, border-color .2s ease, background .2s ease;
    }

    .icon-btn:active, .btn:active, .chip:active { transform: scale(.97); }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(12px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes softPulse {
      0%, 100% { box-shadow: 0 12px 28px rgba(200, 138, 10, .22); }
      50% { box-shadow: 0 16px 36px rgba(200, 138, 10, .34); }
    }

    @keyframes floatMark {
      0%, 100% { transform: translateY(0) rotate(-18deg); }
      50% { transform: translateY(8px) rotate(-16deg); }
    }

    .icon {
      width: 20px;
      height: 20px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .screen-title {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 16px;
      margin: 14px 0 12px;
    }

    h2, h3, p { margin-top: 0; }

    h2 {
      margin-bottom: 0;
      font-size: clamp(24px, 6vw, 40px);
      line-height: 1.02;
      font-weight: 900;
      text-transform: uppercase;
      color: var(--paper);
    }

    h3 {
      margin-bottom: 8px;
      font-size: 20px;
      line-height: 1.08;
      font-weight: 900;
      text-transform: uppercase;
    }

    p {
      color: rgba(242, 241, 232, .82);
      line-height: 1.45;
      font-size: 15px;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 7px;
      color: #f2aa10;
      font-size: 12px;
      font-weight: 900;
      letter-spacing: .05em;
      line-height: 1.25;
      text-transform: uppercase;
    }

    .hero .eyebrow {
      position: relative;
      z-index: 2;
      color: #ffc12a;
      text-shadow: 0 1px 0 rgba(0, 0, 0, .4);
    }

    .hero {
      position: relative;
      min-height: 260px;
      border: 1px solid rgba(242, 241, 232, .2);
      border-radius: 8px;
      overflow: hidden;
      padding: 22px;
      background:
        linear-gradient(120deg, rgba(22, 113, 55, .98) 0%, rgba(17, 96, 48, .9) 55%, rgba(12, 76, 39, .78) 100%),
        repeating-linear-gradient(0deg, rgba(242, 241, 232, .05), rgba(242, 241, 232, .05) 1px, transparent 1px, transparent 8px);
      box-shadow: var(--shadow);
    }

    .hero:after {
      content: "";
      position: absolute;
      width: 210px;
      height: 210px;
      right: -42px;
      top: 28px;
      border: 22px solid rgba(201, 107, 29, .86);
      border-left-color: transparent;
      border-bottom-color: transparent;
      border-radius: 50%;
      transform: rotate(-18deg);
      opacity: .96;
      animation: floatMark 6s ease-in-out infinite;
    }

    .hero h1 {
      position: relative;
      z-index: 1;
      max-width: 760px;
      margin: 10px 0 14px;
      font-size: clamp(40px, 9vw, 76px);
      line-height: .95;
      font-weight: 900;
      text-transform: uppercase;
      color: var(--paper);
      text-shadow: 2px 2px 0 rgba(201, 107, 29, .62);
    }

    .hero p {
      position: relative;
      z-index: 1;
      max-width: 520px;
      color: rgba(242, 241, 232, .9);
      font-size: 18px;
      overflow-wrap: anywhere;
    }

    .hero-actions, .row-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 9px;
      align-items: center;
    }

    .hero-actions {
      position: relative;
      z-index: 1;
    }

    .btn {
      min-height: 46px;
      border-radius: 8px;
      padding: 12px 15px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 9px;
      border: 1px solid rgba(242, 241, 232, .16);
      color: var(--paper);
      font-weight: 950;
      text-transform: uppercase;
      background: rgba(35, 61, 36, .86);
      transition: transform .2s ease, filter .2s ease, background .2s ease;
      text-decoration: none;
    }

    .btn:hover {
      transform: translateY(-2px);
      filter: brightness(1.06);
    }

    .btn.primary {
      color: #1d1403;
      background: linear-gradient(135deg, var(--sun), #e0a31c);
      border-color: rgba(242, 241, 232, .28);
      box-shadow: 0 12px 28px rgba(200, 138, 10, .22);
      animation: softPulse 4s ease-in-out infinite;
    }

    .btn.clay {
      color: #fffaf0;
      background: linear-gradient(135deg, var(--clay), #9e4d12);
    }

    .btn.ghost {
      background: rgba(11, 15, 20, .42);
    }

    .btn.small {
      min-height: 38px;
      padding: 8px 11px;
      font-size: 13px;
    }

    .grid {
      display: grid;
      gap: 12px;
    }

    .grid.two { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .grid.three { grid-template-columns: repeat(3, minmax(0, 1fr)); }

    .card {
      position: relative;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 8px;
      background:
        radial-gradient(circle at 20% 12%, rgba(242, 241, 232, .08), transparent 30%),
        linear-gradient(145deg, rgba(52, 103, 55, .96), rgba(20, 74, 38, .9)),
        repeating-linear-gradient(45deg, rgba(242, 241, 232, .045), rgba(242, 241, 232, .045) 1px, transparent 1px, transparent 9px);
      box-shadow: 0 10px 34px rgba(0, 0, 0, .16);
      padding: 14px;
      animation: fadeUp .42s ease both;
      transition: transform .22s ease, border-color .22s ease, box-shadow .22s ease, filter .22s ease;
    }

    .card:hover {
      transform: translateY(-4px);
      border-color: rgba(242, 193, 42, .42);
      box-shadow: 0 18px 48px rgba(0, 0, 0, .2);
      filter: brightness(1.04);
    }

    .paper-card {
      color: #18150d;
      background:
        linear-gradient(145deg, rgba(242, 241, 232, .98), rgba(217, 209, 188, .92)),
        repeating-linear-gradient(0deg, rgba(11, 15, 20, .05), rgba(11, 15, 20, .05) 1px, transparent 1px, transparent 7px);
    }

    .paper-card p { color: rgba(24, 21, 13, .76); }

    .stamp {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 26px;
      border: 1px dashed currentColor;
      border-radius: 999px;
      padding: 5px 9px;
      color: #231600;
      font-size: 11px;
      font-weight: 900;
      text-transform: uppercase;
      transform: rotate(-1deg);
      background: linear-gradient(135deg, #e4a51c, var(--sun));
      box-shadow: inset 0 1px 0 rgba(242, 241, 232, .34), 0 8px 18px rgba(0, 0, 0, .18);
    }

    .price {
      color: var(--sun);
      font-size: 22px;
      line-height: 1;
      font-weight: 950;
    }

    .old-price {
      color: rgba(242, 241, 232, .45);
      text-decoration: line-through;
      font-size: 14px;
      margin-left: 6px;
    }

    .chips {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding: 2px 0 9px;
      scrollbar-width: none;
    }

    .chips::-webkit-scrollbar { display: none; }

    .chip {
      min-height: 38px;
      white-space: nowrap;
      border-radius: 999px;
      border: 1px solid rgba(242, 241, 232, .18);
      padding: 9px 13px;
      background: rgba(11, 15, 20, .42);
      color: rgba(242, 241, 232, .78);
      font-weight: 900;
      text-transform: uppercase;
      transition: transform .18s ease, background .18s ease, color .18s ease, border-color .18s ease;
    }

    .chip:hover {
      transform: translateY(-1px);
      border-color: rgba(255, 193, 42, .46);
      color: var(--paper);
    }

    .chip.active {
      color: #1f1402;
      background: var(--sun);
      border-color: rgba(242, 241, 232, .4);
    }

    .product-card {
      display: grid;
      gap: 11px;
    }

    .shirt-art {
      min-height: 178px;
      border: 1px solid rgba(242, 241, 232, .13);
      border-radius: 8px;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 32% 20%, rgba(242, 241, 232, .16), transparent 22%),
        radial-gradient(circle at 76% 78%, rgba(200, 138, 10, .1), transparent 28%),
        linear-gradient(145deg, rgba(18, 92, 45, .94), rgba(14, 54, 36, .88));
      overflow: hidden;
      transition: transform .24s ease, filter .24s ease;
    }

    .product-card:hover .shirt-art {
      transform: scale(1.015);
      filter: saturate(1.12);
    }

    .shirt-art img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .shirt-svg {
      width: min(74%, 220px);
      height: auto;
      filter: drop-shadow(0 18px 28px rgba(0, 0, 0, .3));
    }

    .product-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .product-card h3 {
      margin: 0;
      font-size: 22px;
    }

    .product-card p {
      margin-bottom: 0;
      font-size: 14px;
    }

    .sizes {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
    }

    .size {
      min-width: 34px;
      min-height: 31px;
      border-radius: 6px;
      border: 1px solid rgba(242, 241, 232, .18);
      display: grid;
      place-items: center;
      padding: 5px 8px;
      color: rgba(242, 241, 232, .8);
      background: rgba(11, 15, 20, .36);
      font-weight: 900;
    }

    .size.active {
      background: var(--clay);
      color: var(--paper);
    }

    .shortcut {
      min-height: 94px;
      justify-items: start;
      align-content: center;
      text-align: left;
    }

    .shortcut .icon {
      color: var(--sun);
      width: 27px;
      height: 27px;
    }

    .shortcut strong {
      display: block;
      color: var(--paper);
      font-size: 15px;
      font-weight: 900;
      line-height: 1.2;
    }

    .shortcut span {
      display: block;
      margin-top: 4px;
      color: rgba(242, 241, 232, .78);
      font-size: 13px;
      font-weight: 700;
      line-height: 1.35;
    }

    .bottom-nav {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 50;
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 3px;
      padding: 8px 8px calc(8px + var(--safe-bottom));
      background: rgba(4, 17, 8, .92);
      border-top: 1px solid rgba(242, 241, 232, .18);
      backdrop-filter: blur(16px);
    }

    .owner-fab {
      position: fixed;
      right: 12px;
      bottom: calc(74px + var(--safe-bottom));
      z-index: 55;
      width: 42px;
      height: 42px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      border: 1px solid rgba(242, 241, 232, .18);
      color: rgba(242, 241, 232, .78);
      background: rgba(11, 15, 20, .72);
      backdrop-filter: blur(12px);
      box-shadow: 0 10px 24px rgba(0, 0, 0, .24);
    }

    .nav-item {
      min-width: 0;
      min-height: 54px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      gap: 2px;
      color: rgba(242, 241, 232, .64);
      background: transparent;
      font-size: 11px;
      font-weight: 900;
      text-transform: uppercase;
      transition: transform .18s ease, background .18s ease, color .18s ease;
    }

    .nav-item:hover {
      transform: translateY(-1px);
      color: #1f7a3f;
    }

    .nav-item:hover span,
    .nav-item:hover .icon {
      color: #1f7a3f;
      stroke: #1f7a3f;
    }

    .nav-item .icon {
      width: 21px;
      height: 21px;
    }

    .nav-item.active {
      color: #1d1403;
      background: var(--sun);
    }

    .filters {
      display: grid;
      gap: 9px;
      position: sticky;
      top: 72px;
      z-index: 15;
      margin: 0 0 12px;
      padding: 10px 0 2px;
      background:
        radial-gradient(circle at 10% 0%, rgba(242, 241, 232, .08), transparent 28%),
        linear-gradient(145deg, rgba(25, 111, 54, .94), rgba(14, 85, 42, .9));
      backdrop-filter: blur(12px);
      border: 1px solid rgba(242, 241, 232, .14);
      border-radius: 18px;
      box-shadow: 0 14px 34px rgba(0, 0, 0, .14);
    }

    .collection-card {
      min-height: 172px;
      display: grid;
      align-content: end;
      gap: 9px;
    }

    .collection-card:before {
      content: "";
      position: absolute;
      inset: 0;
      opacity: .18;
      background:
        radial-gradient(circle at 18% 22%, var(--sun) 0 4px, transparent 5px),
        radial-gradient(circle at 62% 18%, var(--clay) 0 3px, transparent 4px),
        linear-gradient(120deg, transparent 0 35%, rgba(242, 241, 232, .2) 36% 37%, transparent 38%);
      pointer-events: none;
    }

    .collection-card > * { position: relative; z-index: 1; }

    .offer-card {
      display: grid;
      gap: 10px;
    }

    .admin-shell {
      padding-bottom: 24px;
    }

    .admin-header {
      display: grid;
      gap: 10px;
      margin-bottom: 12px;
    }

    .admin-tabs {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .admin-tab {
      min-height: 66px;
      border-radius: 8px;
      border: 1px solid rgba(242, 241, 232, .16);
      background: rgba(35, 61, 36, .72);
      color: var(--paper);
      padding: 10px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 950;
      text-align: left;
      text-transform: uppercase;
    }

    .admin-tab.active {
      background: var(--sun);
      color: #1e1403;
    }

    .form-grid {
      display: grid;
      gap: 11px;
    }

    .form-grid.two { grid-template-columns: repeat(2, minmax(0, 1fr)); }

    .check-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .check-pill {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      min-height: 38px;
      border: 1px solid rgba(242, 241, 232, .17);
      border-radius: 999px;
      padding: 8px 10px;
      background: rgba(11, 15, 20, .42);
      color: rgba(242, 241, 232, .82);
      font-size: 13px;
      font-weight: 900;
      text-transform: uppercase;
    }

    .check-pill input {
      width: auto;
      min-height: auto;
      accent-color: var(--sun);
    }

    .list-item {
      display: grid;
      gap: 9px;
      border-bottom: 1px solid rgba(242, 241, 232, .12);
      padding: 12px 0;
    }

    .list-item:last-child { border-bottom: 0; }

    .empty {
      border: 1px dashed rgba(242, 241, 232, .2);
      border-radius: 8px;
      padding: 22px;
      text-align: center;
      color: rgba(242, 241, 232, .68);
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      z-index: 80;
      display: grid;
      align-items: end;
      padding: 14px;
      background: rgba(0, 0, 0, .58);
    }

    .modal {
      width: min(680px, 100%);
      max-height: calc(100vh - 28px);
      margin: 0 auto;
      overflow: auto;
      border: 1px solid rgba(242, 241, 232, .2);
      border-radius: 8px;
      background: linear-gradient(145deg, #102618, #07130b);
      box-shadow: var(--shadow);
    }

    .modal-content {
      padding: 14px;
    }

    .modal-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 14px;
      border-bottom: 1px solid rgba(242, 241, 232, .14);
      position: sticky;
      top: 0;
      background: rgba(7, 19, 11, .94);
      backdrop-filter: blur(10px);
      z-index: 1;
    }

    .toast {
      position: fixed;
      left: 14px;
      right: 14px;
      bottom: calc(82px + var(--safe-bottom));
      z-index: 120;
      max-width: 520px;
      margin: 0 auto;
      padding: 13px 15px;
      border-radius: 8px;
      border: 1px solid rgba(242, 241, 232, .2);
      background: var(--ink);
      color: var(--paper);
      box-shadow: var(--shadow);
      font-weight: 900;
      text-align: center;
      transform: translateY(18px);

    }

    function shirtArt(product) {
      return `<div class="shirt-art">${shirtArtInner(product)}</div>`;

    function shirtArtInner(product) {
      if (product.image) return `<img src="${product.image}" alt="${escapeHtml(product.name)}">`;
      const color = product.category === "Pernambuco" || product.status === "Oferta" ? "#C88A0A" : product.category === "Café" ? "#163322" : "#1d6b38";
      const textColor = color === "#C88A0A" ? "#0B0F14" : "#F2F1E8";
      const phrase = String(product.phrase || product.name).slice(0, 34).toUpperCase();
      return `
        <svg class="shirt-svg" viewBox="0 0 220 220" role="img" aria-label="${escapeHtml(product.name)}">
          <path d="M75 38 39 56 20 100l35 16 10-22v88h90V94l10 22 35-16-19-44-36-18c-8 17-62 17-70 0Z" fill="${color}" stroke="rgba(242,241,232,.72)" stroke-width="2"/>
          <path d="M84 42c8 18 44 18 52 0" fill="none" stroke="rgba(242,241,232,.45)" stroke-width="4"/>
          <circle cx="158" cy="68" r="18" fill="#C96B1D" opacity=".9"/>
          <path d="m158 55 4 8 9 1-7 6 2 9-8-5-8 5 2-9-7-6 9-1Z" fill="#F2F1E8"/>
          <text x="110" y="120" text-anchor="middle" fill="${textColor}" font-size="18" font-weight="900" font-family="Arial Narrow, Arial, sans-serif">
            ${escapeHtml(phrase)}
          </text>
          <text x="110" y="146" text-anchor="middle" fill="${textColor}" opacity=".82" font-size="12" font-weight="900">USA VISSE</text>
        </svg>
      `;
    }

    function brandMark() {
      return `

          <path d="M25 7A13 13 0 0 0 7 25 11 11 0 0 1 25 7Z" fill="#C96B1D"/>
          <path d="m22 5 2 5 5 1-4 3 1 5-4-3-4 3 1-5-4-3 5-1Z" fill="#C88A0A"/>
          <path d="M9 24c2-5 8-8 14-7" fill="none" stroke="#F2F1E8" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      `;
    }

    function selectTemplate(name, options, selected, labeler = value => value) {
      return `<select name="${name}">${options.map(option => `<option value="${escapeHtml(option)}" ${option === selected ? "selected" : ""}>${escapeHtml(labeler(option))}</option>`).join("")}</select>`;
    }

    function sortedProducts() {
      const weight = product => {
        if (product.featured) return 0;
        if (product.status === "Novo") return 1;
        if (product.status === "Mais vendido") return 2;
        if (product.status === "Oferta") return 3;
        return 4;
      };
      return [...state.products].sort((a, b) => weight(a) - weight(b) || (b.createdAt || 0) - (a.createdAt || 0));
    }

    function filteredProducts() {
      const query = ui.filters.search.trim().toLowerCase();
      return sortedProducts().filter(product => {
        const text = [product.name, product.phrase, product.category, product.collection].join(" ").toLowerCase();
        const categoryOk =
          ui.filters.category === "Todas" ||
          product.category === ui.filters.category ||
          (ui.filters.category === "Mais vendidas" && product.status === "Mais vendido") ||
          (ui.filters.category === "Novidades" && product.status === "Novo") ||
          (ui.filters.category === "Ofertas" && product.status === "Oferta");
        const sizeOk = ui.filters.size === "Todos" || (product.sizes || []).includes(ui.filters.size);
        const price = Number(product.promoPrice || product.price || 0);
        const priceOk = ui.filters.price === "Todos" || (ui.filters.price === "Até R$80" && price <= 80) || (ui.filters.price === "Promoções" && product.promoPrice);
        return (!query || text.includes(query)) && categoryOk && sizeOk && priceOk;
      });
    }

    function sortedCollections() {
      return [...state.collections].sort((a, b) => Number(a.order || 0) - Number(b.order || 0));
    }

    function shortcutIcon(label) {
      if (label === "Regionais") return icons.cactus;
      if (label === "Presentes") return icons.tag;
      if (label === "Mais vendidas") return icons.star;
      if (label === "Novidades") return icons.sun;
      if (label === "Ofertas") return icons.tag;
      return icons.shirt;
    }

    function shortcutText(label) {
      const copy = {
        Debochadas: "Humor com sotaque",
        Regionais: "Orgulho da terra",
        Presentes: "Acerto criativo",
        "Mais vendidas": "As queridinhas",
        Novidades: "Chegou agora",
        Ofertas: "Condição boa"
      };
      return copy[label] || "Ver agora";
    }

    function handleClick(event) {
      const target = event.target.closest("button, [data-tab], [data-action], [data-product], [data-buy], [data-buy-final], [data-category-shortcut], [data-open-collection], [data-filter-category], [data-filter-size], [data-filter-price], [data-admin-view], [data-edit-product], [data-duplicate-product], [data-toggle-featured], [data-set-weekly], [data-remove-product], [data-edit-collection], [data-remove-collection], [data-edit-offer], [data-remove-offer], [data-offer-whatsapp]");
      if (!target) return;

      if (target.dataset.tab) {
        ui.tab = target.dataset.tab;
        ui.selectedCollection = "";
        render();
        return;
      }

      if (target.dataset.adminView) {
        ui.adminView = target.dataset.adminView;
        render();
        return;
      }

      if (target.dataset.filterCategory) {
        ui.filters.category = target.dataset.filterCategory;
        render();
        return;
      }

      if (target.dataset.filterSize) {
        ui.filters.size = target.dataset.filterSize;
        render();
        return;
      }

      if (target.dataset.filterPrice) {
        ui.filters.price = target.dataset.filterPrice;
        render();
        return;
      }

      if (target.dataset.categoryShortcut) {
        ui.filters.category = target.dataset.categoryShortcut;
        ui.tab = "shirts";
        render();
        return;
      }

      if (target.dataset.openCollection) {
        ui.selectedCollection = target.dataset.openCollection;
        ui.tab = "collections";
        render();
        return;
      }

      if (target.dataset.product) {
        ui.selectedProductId = target.dataset.product;
        ui.selectedSize = "";
        render();
        return;
      }

      if (target.dataset.selectSize) {
        ui.selectedSize = target.dataset.selectSize;
        render();
        return;
      }

      if (target.dataset.buy) {
        ui.selectedProductId = target.dataset.buy;
        ui.selectedSize = "";
        render();
        return;
      }

      if (target.dataset.buyFinal) {
        buyProduct(target.dataset.buyFinal);
        return;
      }

      if (target.dataset.offerWhatsapp) {
        const offer = state.offers.find(item => item.id === target.dataset.offerWhatsapp);
        if (offer) openWhatsApp(`Olá, vi a oferta "${offer.title}" no app da Usa Visse e quero saber mais`);
        return;
      }

      if (target.dataset.editProduct) {
        ui.editingProductId = target.dataset.editProduct;
        ui.adminView = "product";
        render();
        return;
      }

      if (target.dataset.duplicateProduct) {
        duplicateProduct(target.dataset.duplicateProduct);
        return;
      }

      if (target.dataset.toggleFeatured) {
        const product = state.products.find(item => item.id === target.dataset.toggleFeatured);
        if (product) product.featured = !product.featured;
        saveAndRender("Destaque atualizado");
        return;
      }

      if (target.dataset.setWeekly) {
        state.products.forEach(product => product.weekly = product.id === target.dataset.setWeekly);
        saveAndRender("Camisa da semana atualizada");
        return;
      }

      if (target.dataset.removeProduct) {
        if (confirm("Remover esta camisa da vitrine?")) {
          state.products = state.products.filter(item => item.id !== target.dataset.removeProduct);
          saveAndRender("Camisa removida");
        }
        return;
      }

      if (target.dataset.editCollection) {
        ui.editingCollectionId = target.dataset.editCollection;
        render();
        return;
      }

      if (target.dataset.removeCollection) {
        const collection = state.collections.find(item => item.id === target.dataset.removeCollection);
        if (collection && confirm("Remover esta coleção? Produtos vinculados continuam na vitrine")) {
          state.collections = state.collections.filter(item => item.id !== target.dataset.removeCollection);
          saveAndRender("Coleção removida");
        }
        return;
      }

      if (target.dataset.editOffer) {
        ui.editingOfferId = target.dataset.editOffer;
        render();
        return;
      }

      if (target.dataset.removeOffer) {
        if (confirm("Remover esta oferta?")) {
          state.offers = state.offers.filter(item => item.id !== target.dataset.removeOffer);
          saveAndRender("Oferta removida");
        }
        return;
      }

      const action = target.dataset.action;
      if (!action) return;

      if (action === "owner-login") {
        const password = prompt("Senha do Modo Dono");
        if (password === ADMIN_PASSWORD) {
          ui.admin = true;
          ui.adminView = "product";
          toast("Modo Dono liberado");
          render();
        } else if (password !== null) {
          toast("Senha incorreta");
        }
      }

      if (action === "exit-admin") {
        ui.admin = false;
        render();
      }

      if (action === "install") installApp();
      if (action === "whatsapp-generic") openWhatsApp("Olá, quero ver as camisas criativas da Usa Visse");
      if (action === "club-whatsapp") openWhatsApp(state.club.message || "Olá, quero entrar no Clube Visse e receber novidades da Usa Visse");
      if (action === "refer-friend") openWhatsApp(`Oxente, olha essa loja de camisas criativas de Pernambuco. Tu vai gostar: ${APP_CONFIG.appLink}`);
      if (action === "highlight") handleHighlightAction();
      if (action === "close-modal") {
        ui.selectedProductId = "";
        ui.selectedSize = "";
        render();
      }
      if (action === "back-collections") {
        ui.selectedCollection = "";
        render();
      }
      if (action === "cancel-edit-product") {
        ui.editingProductId = "";
        render();
      }
      if (action === "cancel-edit-collection") {
        ui.editingCollectionId = "";
        render();
      }
      if (action === "cancel-edit-offer") {
        ui.editingOfferId = "";
        render();
      }
    }

    function handleInput(event) {
      if (event.target.dataset.filter === "search") {
        ui.filters.search = event.target.value;
        render();
      }
    }

    function handleChange(event) {
      if (event.target.matches('input[type="file"][name="image"]')) {
        const file = event.target.files && event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = () => {
          event.target.dataset.base64 = reader.result;
          toast("Imagem carregada, agora é só salvar");
        };
        reader.readAsDataURL(file);
      }
    }

    async function handleSubmit(event) {
      event.preventDefault();
      const form = event.target;
      const type = form.dataset.form;
      const data = new FormData(form);
      if (type === "product") await saveProduct(form, data);
      if (type === "collection") saveCollection(data);
      if (type === "offer") saveOffer(data);
      if (type === "highlight") saveHighlight(data);
      if (type === "club") saveClub(data);
    }

    async function saveProduct(form, data) {
      const editing = state.products.find(item => item.id === ui.editingProductId);
      const fileInput = form.querySelector('input[type="file"][name="image"]');
      const image = fileInput && fileInput.dataset.base64 ? fileInput.dataset.base64 : (editing && editing.image) || "";
      const sizes = data.getAll("sizes");
      const product = {
        id: editing ? editing.id : uid(),
        name: data.get("name").trim(),
        phrase: data.get("phrase").trim(),
        description: data.get("description").trim(),
        price: Number(data.get("price") || 0),
        promoPrice: data.get("promoPrice") ? Number(data.get("promoPrice")) : "",
        category: data.get("category"),
        collection: data.get("collection"),
        sizes: sizes.length ? sizes : ["P", "M", "G"],
        status: data.get("status"),
        image,
        featured: data.get("featured") === "on",
        weekly: data.get("weekly") === "on",
        createdAt: editing ? editing.createdAt : Date.now()
      };
      if (product.weekly) state.products.forEach(item => item.weekly = false);
      if (editing) {
        state.products = state.products.map(item => item.id === editing.id ? product : item);
      } else {
        state.products.push(product);
      }
      ui.editingProductId = "";
      ui.adminView = "showcase";
      saveAndRender("Camisa salva na vitrine");
    }

    function saveCollection(data) {
      const editing = state.collections.find(item => item.id === ui.editingCollectionId);
      const collection = {
        id: editing ? editing.id : uid(),
        name: data.get("name").trim(),
        description: data.get("description").trim(),
        texture: data.get("texture").trim(),
        image: editing ? editing.image || "" : "",
        order: Number(data.get("order") || state.collections.length + 1)
      };
      if (editing) {
        state.collections = state.collections.map(item => item.id === editing.id ? collection : item);
      } else {
        state.collections.push(collection);
      }
      ui.editingCollectionId = "";
      saveAndRender("Coleção salva");
    }

    function saveOffer(data) {
      const editing = state.offers.find(item => item.id === ui.editingOfferId);
      const offer = {
        id: editing ? editing.id : uid(),
        title: data.get("title").trim(),
        description: data.get("description").trim(),
        period: data.get("period").trim(),
        type: data.get("type"),
        buttonText: data.get("buttonText").trim() || "Chamar no WhatsApp",
        productId: data.get("productId"),
        isMain: data.get("isMain") === "on"
      };
      if (offer.isMain) state.offers.forEach(item => item.isMain = false);
      if (editing) {
        state.offers = state.offers.map(item => item.id === editing.id ? offer : item);
      } else {
        state.offers.push(offer);
      }
      ui.editingOfferId = "";
      saveAndRender("Oferta publicada");
    }

    function saveHighlight(data) {
      state.highlight = {
        title: data.get("title").trim(),
        description: data.get("description").trim(),
        period: data.get("period").trim(),
        buttonText: data.get("buttonText").trim(),
        actionType: data.get("actionType"),
        relatedId: data.get("relatedId").trim()
      };
      saveAndRender("Destaque atualizado");
    }

    function saveClub(data) {
      state.club = {
        title: data.get("title").trim(),
        description: data.get("description").trim(),
        benefits: data.get("benefits").trim(),
        buttonText: data.get("buttonText").trim(),
        message: data.get("message").trim()
      };
      saveAndRender("Clube Visse atualizado");
    }

    function duplicateProduct(id) {
      const product = state.products.find(item => item.id === id);
      if (!product) return;
      state.products.push({
        ...product,
        id: uid(),
        name: product.name + " cópia",
        featured: false,
        weekly: false,
        createdAt: Date.now()
      });
      saveAndRender("Produto duplicado");
    }

    function buyProduct(id) {
      const product = state.products.find(item => item.id === id);
      if (!product) return;
      if (!ui.selectedSize) {
        toast("Escolha um tamanho antes de comprar");
        return;
      }
      openWhatsApp(`Olá, tenho interesse na camisa "${product.name}", tamanho ${ui.selectedSize}, vi pelo app da Usa Visse`);
    }

    function handleHighlightAction() {
      if (state.highlight.actionType === "Entrar no Clube") {
        ui.tab = "club";
        render();
        return;
      }
      if (state.highlight.actionType === "Ver coleção" && state.highlight.relatedId) {
        ui.tab = "collections";
        ui.selectedCollection = state.highlight.relatedId;
        render();
        return;
      }
      if (state.highlight.actionType === "Ver produto" && state.highlight.relatedId) {
        const product = state.products.find(item => item.id === state.highlight.relatedId || item.name === state.highlight.relatedId);
        if (product) {
          ui.selectedProductId = product.id;
          ui.selectedSize = "";
          render();
          return;
        }
      }
      openWhatsApp(`Oxente, olha essa loja de camisas criativas de Pernambuco. Tu vai gostar: ${APP_CONFIG.appLink}`);
    }

    function openWhatsApp(message) {
      const url = `https://wa.me/${APP_CONFIG.whatsapp}?text=${encodeURIComponent(message)}`;
      window.open(url, "_blank", "noopener");
    }

    async function installApp() {
      if (ui.deferredPrompt) {
        ui.deferredPrompt.prompt();
        await ui.deferredPrompt.userChoice;
        ui.deferredPrompt = null;
        render();
      } else {
        alert("Android: toque no menu do navegador e escolha Instalar app ou Adicionar à tela inicial\n\niPhone: toque no botão de compartilhar do Safari e escolha Adicionar à Tela de Início");
      }
    }

    function saveAndRender(message) {
      saveState();
      toast(message);
      render();
    }

    function toast(message) {
      toastEl.textContent = message;
      toastEl.classList.add("show");
      clearTimeout(toastEl.timer);
      toastEl.timer = setTimeout(() => toastEl.classList.remove("show"), 2200);
    }

    function initPwa() {
      const iconSvg = encodeURIComponent(`
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
          <rect width="512" height="512" rx="92" fill="#062D12"/>
          <path d="M378 118A210 210 0 0 0 134 362 174 174 0 0 1 378 118Z" fill="#C96B1D"/>
          <path d="m340 78 31 70 76 8-57 50 17 74-67-39-67 39 17-74-57-50 76-8Z" fill="#C88A0A"/>
          <text x="256" y="326" text-anchor="middle" fill="#F2F1E8" font-family="Arial Black, Arial" font-size="76">USA</text>
          <text x="256" y="392" text-anchor="middle" fill="#F2F1E8" font-family="Arial Black, Arial" font-size="64">VISSE</text>
        </svg>
      `);
      const iconHref = `data:image/svg+xml,${iconSvg}`;
      document.getElementById("favicon").href = iconHref;
      const manifest = {
        name: "Usa Visse",
        short_name: "Usa Visse",
        start_url: ".",
        display: "standalone",
        background_color: APP_CONFIG.primaryColor,
        theme_color: APP_CONFIG.primaryColor,
        icons: [
          { src: iconHref, sizes: "512x512", type: "image/svg+xml", purpose: "any maskable" }
        ]
      };
      const blob = new Blob([JSON.stringify(manifest)], { type: "application/manifest+json" });
      document.getElementById("manifestLink").href = URL.createObjectURL(blob);
    }
  </script>
</body>
</html>
